<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수경..기다림</title>
<style>html,body{margin:0;padding:0;min-height:100%;background:#fdf3f0;}</style>
</head>
<body>
<div id="app">
  <style>
    #app {
      --sky-top: #fdf3f0;
      --sky-mid: #fbeaf1;
      --sky-bot: #efe9fb;
      --cloud: #ffffff;
      --peach: #ffb7a3;
      --peach-deep: #f79c85;
      --pink: #f6c6d8;
      --lav: #b9a8e3;
      --ink: #6b5d7a;
      --ink-soft: #a294b5;
      --shadow: 0 10px 30px -12px rgba(185, 168, 227, 0.45);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Pretendard", "Malgun Gothic", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100%;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bot) 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app * { box-sizing: border-box; margin: 0; padding: 0; }
    #app .wrap {
      position: relative;
      max-width: 460px;
      margin: 0 auto;
      padding: 38px 22px 60px;
    }

    /* drifting background clouds */
    #app .bgcloud {
      position: absolute;
      border-radius: 99px;
      background: rgba(255,255,255,0.55);
      filter: blur(2px);
      pointer-events: none;
    }
    #app .bgcloud::before, #app .bgcloud::after {
      content: ""; position: absolute; border-radius: 50%;
      background: inherit;
    }
    #app .bgcloud::before { width: 55%; height: 160%; left: 12%; top: -75%; }
    #app .bgcloud::after  { width: 42%; height: 120%; right: 14%; top: -48%; }
    #app .c1 { width: 150px; height: 44px; top: 90px; left: -50px; animation: drift 46s linear infinite; }
    #app .c2 { width: 110px; height: 34px; top: 300px; right: -40px; animation: drift 58s linear infinite reverse; opacity: 0.7; }
    #app .c3 { width: 90px; height: 28px; top: 520px; left: -30px; animation: drift 64s linear infinite; opacity: 0.6; }
    @keyframes drift {
      from { transform: translateX(-120px); }
      to   { transform: translateX(560px); }
    }

    /* wordmark */
    #app .mark { position: relative; text-align: center; margin-bottom: 26px; }
    #app .mark .title {
      display: inline-block;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--ink);
      background: var(--cloud);
      padding: 12px 26px;
      border-radius: 99px;
      box-shadow: var(--shadow);
    }
    #app .mark .title .nm { cursor: text; }
    #app .mark .title .dots { color: var(--peach-deep); letter-spacing: 0.08em; }
    #app .mark .sub {
      margin-top: 12px;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
    }
    #app .mark input {
      background: transparent; border: none; outline: none;
      font: inherit; color: var(--peach-deep); text-align: center;
      letter-spacing: 0.15em; width: 5.5em;
      border-bottom: 2px dotted var(--pink);
    }

    /* hero cloud */
    #app .hero {
      position: relative;
      text-align: center;
      margin-bottom: 30px;
    }
    #app .cloudcard {
      position: relative;
      background: var(--cloud);
      border-radius: 44px;
      padding: 44px 24px 36px;
      box-shadow: var(--shadow);
    }
    /* cloud bumps on top */
    #app .cloudcard::before, #app .cloudcard::after {
      content: "";
      position: absolute;
      background: var(--cloud);
      border-radius: 50%;
      top: -22px;
    }
    #app .cloudcard::before { width: 74px; height: 74px; left: 26%; }
    #app .cloudcard::after  { width: 52px; height: 52px; left: 46%; top: -30px; }
    #app .bump3 {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      background: var(--cloud); top: -18px; left: 58%;
    }
    #app.waiting .cloudcard { animation: floaty 5s ease-in-out infinite; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-7px); }
    }

    #app .clock {
      position: relative;
      font-size: 54px;
      font-weight: 300;
      letter-spacing: 0.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--ink);
    }
    #app .clock .u { font-size: 20px; color: var(--pink); margin: 0 3px; font-weight: 500; }
    #app.waiting .clock { color: var(--peach-deep); }
    #app .status {
      position: relative;
      margin-top: 15px;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: var(--ink-soft);
      min-height: 18px;
    }
    #app.waiting .status { color: var(--lav); }

    /* main button */
    #app .btn {
      position: relative;
      display: block;
      width: 78%;
      margin: 26px auto 0;
      padding: 16px;
      border: none;
      border-radius: 99px;
      background: linear-gradient(180deg, #cfc2ef, var(--lav));
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.16em;
      cursor: pointer;
      box-shadow: 0 8px 22px -8px rgba(185,168,227,0.7);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }
    #app .btn:hover { transform: translateY(-2px); }
    #app .btn:active { transform: scale(0.97); }
    #app.waiting .btn {
      background: linear-gradient(180deg, var(--peach), var(--peach-deep));
      box-shadow: 0 8px 24px -8px rgba(247,156,133,0.75);
    }
    #app .btn:focus-visible { outline: 3px solid var(--pink); outline-offset: 3px; }

    /* total cloud */
    #app .total {
      position: relative;
      background: rgba(255,255,255,0.72);
      border-radius: 32px;
      padding: 26px 22px 24px;
      box-shadow: var(--shadow);
    }
    #app .total .label {
      font-size: 11.5px; letter-spacing: 0.14em; color: var(--ink-soft);
      text-align: center;
    }
    #app .total .big {
      text-align: center;
      margin-top: 11px;
      font-size: 29px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
    }
    #app .total .big em {
      font-style: normal; color: var(--lav); font-size: 14px;
      font-weight: 500; margin: 0 7px 0 2px;
    }
    #app .track {
      margin-top: 18px;
      height: 14px; border-radius: 99px;
      background: #f3ecf7;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(185,168,227,0.18);
    }
    #app .track > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--pink), var(--peach));
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(.2,.7,.3,1);
    }
    #app .track-label {
      margin-top: 10px; text-align: center;
      font-size: 11.5px; letter-spacing: 0.04em; color: var(--ink-soft);
    }
    #app .chips {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
      margin-top: 16px;
    }
    #app .chip {
      font-size: 11.5px; letter-spacing: 0.03em; color: var(--ink);
      padding: 6px 13px;
      border-radius: 99px; background: #fdf0ea;
    }
    #app .chip b { color: var(--peach-deep); font-weight: 700; }

    /* log */
    #app .log-head {
      margin: 32px 4px 12px;
      font-size: 12px; letter-spacing: 0.14em; color: var(--ink-soft);
    }
    #app .empty {
      text-align: center; color: var(--ink-soft); font-size: 13px;
      background: rgba(255,255,255,0.6);
      border-radius: 26px;
      padding: 28px 18px; line-height: 1.8;
      box-shadow: var(--shadow);
    }
    #app .row {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(255,255,255,0.78);
      border-radius: 22px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 6px 18px -10px rgba(185,168,227,0.4);
    }
    #app .row .dur {
      font-size: 16px; font-weight: 600;
      font-variant-numeric: tabular-nums; min-width: 90px;
      color: var(--peach-deep);
    }
    #app .row .meta { flex: 1; min-width: 0; }
    #app .row .when { font-size: 11.5px; color: var(--ink-soft); letter-spacing: 0.03em; }
    #app .row .memo {
      margin-top: 5px; width: 100%;
      background: transparent; border: none; outline: none;
      color: var(--lav); font: inherit; font-size: 12.5px;
    }
    #app .row .memo::placeholder { color: #d8cfe8; }
    #app .row .del {
      background: none; border: none; cursor: pointer; color: #d8cfe8;
      font-size: 16px; line-height: 1; padding: 2px 4px;
      transition: color 0.2s;
    }
    #app .row .del:hover { color: var(--peach-deep); }

    @media (prefers-reduced-motion: reduce) {
      #app .bgcloud { animation: none !important; }
      #app.waiting .cloudcard { animation: none; }
      #app .track > i { transition: none; }
    }
  </style>

  <div class="wrap">
    <div class="bgcloud c1"></div>
    <div class="bgcloud c2"></div>
    <div class="bgcloud c3"></div>

    <div class="mark">
      <div class="title" id="mark"></div>
      <div class="sub">기다린 시간, 몽글몽글 모아두기</div>
    </div>

    <div class="hero">
      <div class="cloudcard">
        <div class="bump3"></div>
        <div class="clock" id="clock">00<span class="u">:</span>00<span class="u">:</span>00</div>
        <div class="status" id="status">지금은 기다리는 중이 아니에요</div>
        <button class="btn" id="btn">기다리기 시작</button>
      </div>
    </div>

    <div class="total">
      <div class="label">지금까지 총 기다린 시간</div>
      <div class="big" id="total">0<em>분</em></div>
      <div class="track"><i id="bar"></i></div>
      <div class="track-label" id="barLabel"></div>
      <div class="chips" id="chips"></div>
    </div>

    <div class="log-head">기다림 기록</div>
    <div id="log"></div>
  </div>

  <script>
    (function () {
      const app = document.getElementById("app");
      const KEY = "sookyoung_waiting_v1";
      const WEEK = 7 * 24 * 3600; // seconds

      let data = { name: "수경", sessions: [], activeStart: null };
      let tick = null;

      const $ = (id) => document.getElementById(id);

      async function load() {
        try {
          const r = localStorage.getItem(KEY);
          if (r) data = JSON.parse(r);
        } catch (e) { /* first run: keep defaults */ }
        if (!data.sessions) data.sessions = [];
        if (data.activeStart) startTicking();
        renderAll();
      }
      async function save() {
        try { localStorage.setItem(KEY, JSON.stringify(data)); }
        catch (e) { /* best effort */ }
      }

      function fmtClock(sec) {
        sec = Math.max(0, Math.floor(sec));
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        const p = (n) => String(n).padStart(2, "0");
        return `${p(h)}<span class="u">:</span>${p(m)}<span class="u">:</span>${p(s)}`;
      }
      function fmtTotal(sec) {
        sec = Math.floor(sec);
        const d = Math.floor(sec / 86400);
        const h = Math.floor((sec % 86400) / 3600);
        const m = Math.floor((sec % 3600) / 60);
        let out = "";
        if (d) out += `${d}<em>일</em>`;
        if (d || h) out += `${h}<em>시간</em>`;
        out += `${m}<em>분</em>`;
        return out;
      }
      function fmtDur(sec) {
        sec = Math.floor(sec);
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        if (h) return `${h}시간 ${m}분`;
        if (m) return `${m}분 ${s}초`;
        return `${s}초`;
      }
      function whenLabel(iso) {
        const dt = new Date(iso);
        const now = new Date();
        const sameDay = dt.toDateString() === now.toDateString();
        const y = new Date(now); y.setDate(now.getDate() - 1);
        const isYday = dt.toDateString() === y.toDateString();
        const hm = dt.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
        if (sameDay) return `오늘 ${hm}`;
        if (isYday) return `어제 ${hm}`;
        return `${dt.getMonth() + 1}월 ${dt.getDate()}일 ${hm}`;
      }

      function totalSeconds() {
        return data.sessions.reduce((a, s) => a + s.seconds, 0);
      }

      function renderMark() {
        $("mark").innerHTML =
          `<span class="nm">${escapeHtml(data.name)}</span><span class="dots">..</span>기다림`;
        $("mark").querySelector(".nm").onclick = editName;
      }
      function editName() {
        const el = $("mark");
        const cur = data.name;
        el.innerHTML = `<input id="nameIn" value="${escapeHtml(cur)}" maxlength="8" />`;
        const inp = $("nameIn");
        inp.focus(); inp.select();
        const commit = () => {
          const v = inp.value.trim();
          data.name = v || "수경";
          save(); renderMark(); renderHero();
        };
        inp.onblur = commit;
        inp.onkeydown = (e) => { if (e.key === "Enter") inp.blur(); };
      }

      function renderHero() {
        const waiting = !!data.activeStart;
        app.classList.toggle("waiting", waiting);
        if (waiting) {
          const sec = (Date.now() - new Date(data.activeStart).getTime()) / 1000;
          $("clock").innerHTML = fmtClock(sec);
          $("status").textContent = `${data.name} 기다리는 중 · 구름 위에서 동동`;
          $("btn").textContent = "왔다!";
        } else {
          $("clock").innerHTML = fmtClock(0);
          $("status").textContent = "지금은 기다리는 중이 아니에요";
          $("btn").textContent = "기다리기 시작";
        }
      }

      function renderTotal() {
        const t = totalSeconds();
        $("total").innerHTML = t < 60 ? "0<em>분</em>" : fmtTotal(t);
        const pct = Math.min(100, (t / WEEK) * 100);
        $("bar").style.width = pct + "%";
        if (t >= WEEK) {
          $("barLabel").textContent = "일주일 돌파!";
        } else {
          $("barLabel").textContent = `'일주일'까지 ${pct.toFixed(0)}%`;
        }
        const cmp = [
          { n: Math.floor(t / 7200), unit: "영화", suf: "편" },
          { n: Math.floor(t / 300), unit: "라면", suf: "번" },
          { n: Math.floor(t / 210), unit: "노래", suf: "곡" },
        ].filter((c) => c.n >= 1).slice(0, 3);
        $("chips").innerHTML = cmp
          .map((c) => `<span class="chip">${c.unit} <b>${c.n}</b>${c.suf}</span>`)
          .join("");
      }

      function renderLog() {
        const log = $("log");
        if (!data.sessions.length) {
          log.innerHTML =
            `<div class="empty">아직 기다린 기록이 없어요.<br>${escapeHtml(data.name)}을(를) 기다리게 되면<br>구름 버튼을 살짝 눌러줘요 ☁️</div>`;
          return;
        }
        const items = [...data.sessions].reverse();
        log.innerHTML = items
          .map(
            (s) => `
          <div class="row" data-id="${s.id}">
            <div class="dur">${fmtDur(s.seconds)}</div>
            <div class="meta">
              <div class="when">${whenLabel(s.start)}</div>
              <input class="memo" placeholder="메모 (어디서 기다렸어?)" value="${escapeHtml(s.memo || "")}" />
            </div>
            <button class="del" title="삭제">&times;</button>
          </div>`
          )
          .join("");
        log.querySelectorAll(".row").forEach((row) => {
          const id = Number(row.dataset.id);
          row.querySelector(".memo").addEventListener("change", (e) => {
            const s = data.sessions.find((x) => x.id === id);
            if (s) { s.memo = e.target.value; save(); }
          });
          row.querySelector(".del").addEventListener("click", () => {
            data.sessions = data.sessions.filter((x) => x.id !== id);
            save(); renderTotal(); renderLog();
          });
        });
      }

      function renderAll() {
        renderMark(); renderHero(); renderTotal(); renderLog();
      }

      function startTicking() {
        clearInterval(tick);
        tick = setInterval(() => {
          const sec = (Date.now() - new Date(data.activeStart).getTime()) / 1000;
          $("clock").innerHTML = fmtClock(sec);
        }, 1000);
      }

      $("btn").addEventListener("click", () => {
        if (data.activeStart) {
          const start = data.activeStart;
          const seconds = Math.round((Date.now() - new Date(start).getTime()) / 1000);
          data.sessions.push({
            id: Date.now(),
            start,
            end: new Date().toISOString(),
            seconds,
            memo: "",
          });
          data.activeStart = null;
          clearInterval(tick);
          save();
          renderAll();
        } else {
          data.activeStart = new Date().toISOString();
          startTicking();
          save();
          renderHero();
        }
      });

      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
        );
      }

      load();
    })();
  </script>
</div>

</body>
</html>
